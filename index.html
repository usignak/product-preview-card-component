<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" /> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png" />
  
  <title>Frontend Mentor | Product preview card component</title>

  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700&family=Montserrat:wght@100..900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="card">
    <div class="card-image"></div>
    <div class="card-text">
      <h3 class="subtitle">Perfume</h3>
      <h1 class="title">Gabrielle Essence Eau De Parfum</h1>
      <p class="text">A floral, solar and voluptuous interpretation composed by Olivier Polge, Perfumer-Creator for the House of CHANEL.</p>
      <div class="price">
        <div class="new-price">$149.99</div>
        <div class="old-price"><del>$169.99</del></div>
      </div>
      <button class="btn" type="button">
        <img src="images/icon-cart.svg" alt="" />
        Add to Cart
      </button>
    </div>
  </div>

</body>
</html>
